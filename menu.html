<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0C8B93">
<title>اطلب أونلاين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Cairo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --p:#0FB5BA;--pd:#0C8B93;--pdd:#0a6e74;--pl:#E3F7F8;
  --bg:#F1F6F8;--sur:#fff;--sur2:#F6FAFB;--tx:#12333B;--tx2:#5C7A82;--tx3:#9BB6BC;
  --bd:#E4EEF0;--red:#E2563B;--green:#18A558;--amber:#E2920C;--gold:#E0A030;
  --r:18px;--sh:0 2px 14px rgba(12,110,118,.07);--sh2:0 14px 44px rgba(10,90,100,.16);
  --grad:linear-gradient(135deg,#12c2c9,#0C8B93);
}
[data-preset="berry"]{--p:#E0356E;--pd:#A4114B;--pdd:#7c0d38;--pl:#FCE4EF;--grad:linear-gradient(135deg,#F0629A,#A4114B)}
[data-preset="ocean"]{--p:#2E90F0;--pd:#1565C0;--pdd:#0D47A1;--pl:#E3F0FD;--grad:linear-gradient(135deg,#48A6F7,#1565C0)}
[data-preset="forest"]{--p:#2E9E5B;--pd:#1F7A43;--pdd:#175d33;--pl:#E2F5E9;--grad:linear-gradient(135deg,#54C07E,#1F7A43)}
[data-preset="royal"]{--p:#8256FF;--pd:#5E35B1;--pdd:#4527A0;--pl:#EFE9FD;--grad:linear-gradient(135deg,#9E80FF,#5E35B1)}
[data-preset="sunset"]{--p:#F5591E;--pd:#D84315;--pdd:#BF360C;--pl:#FDEAE2;--grad:linear-gradient(135deg,#FF7A45,#D84315)}
html[data-theme="dark"]{--bg:#0c1419;--sur:#15222a;--sur2:#111c23;--tx:#e8f1f3;--tx2:#9db4bb;--tx3:#5f767e;--bd:#233139;--pl:#0e2a30;--sh:0 2px 14px rgba(0,0,0,.3);--sh2:0 16px 48px rgba(0,0,0,.55)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.6;min-height:100dvh;overflow-x:hidden}
img{max-width:100%}
button{font-family:inherit;cursor:pointer;border:none}
::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:6px}
.wrap{max-width:1200px;margin:0 auto;padding:0 16px}
.hidden{display:none!important}

/* ===== الهيدر الثابت ===== */
.topbar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--sur) 94%,transparent);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bd);box-shadow:0 2px 16px rgba(0,0,0,.04)}
.topbar-in{max-width:1200px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.brand .logo{width:46px;height:46px;border-radius:13px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--bd)}
.brand .logo img{max-width:38px;max-height:38px;object-fit:contain}
.brand .logo .mk{font-family:'Cairo',sans-serif;font-weight:900;font-size:22px;color:var(--pd)}
.brand .nm{font-family:'Cairo',sans-serif;font-weight:800;font-size:17px;color:var(--tx);white-space:nowrap}
.brand .nm small{display:block;font-size:10px;color:var(--tx3);font-weight:400}
.tb-search{flex:1;position:relative;max-width:440px}
.tb-search input{width:100%;padding:11px 42px 11px 14px;border:1.5px solid var(--bd);border-radius:13px;font-family:inherit;font-size:14.5px;background:var(--sur2);color:var(--tx)}
.tb-search input:focus{outline:none;border-color:var(--p);background:var(--sur)}
.tb-search .ic{position:absolute;top:50%;transform:translateY(-50%);inset-inline-start:14px;color:var(--tx3);pointer-events:none}
.tb-actions{display:flex;align-items:center;gap:8px;margin-inline-start:auto}
.tb-btn{position:relative;width:44px;height:44px;border-radius:13px;background:var(--sur2);border:1.5px solid var(--bd);
  font-size:19px;display:flex;align-items:center;justify-content:center;color:var(--tx);transition:.15s}
.tb-btn:hover{border-color:var(--p);background:var(--pl)}
.tb-btn:active{transform:scale(.92)}
.tb-badge{position:absolute;top:-5px;inset-inline-end:-5px;background:var(--red);color:#fff;font-size:10px;font-weight:800;
  min-width:19px;height:19px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--sur)}
.tb-account{display:flex;align-items:center;gap:7px;padding:7px 13px 7px 9px;border-radius:13px;background:var(--pl);color:var(--pd);font-weight:700;font-size:13px;border:1.5px solid transparent;white-space:nowrap}
.tb-account .av{width:28px;height:28px;border-radius:9px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
.tb-account .pts{font-size:11px;background:#FDF3DC;color:#B07B10;border-radius:8px;padding:1px 7px;font-weight:800}
html[data-theme="dark"] .tb-account .pts{background:#3a2f10;color:#f2c14e}

/* شريط تصنيفات ثانوي */
.catbar{background:var(--sur);border-bottom:1px solid var(--bd);position:sticky;top:65px;z-index:25}
.catbar-in{max-width:1200px;margin:0 auto;display:flex;gap:6px;overflow-x:auto;padding:9px 16px;scrollbar-width:none}
.catbar-in::-webkit-scrollbar{display:none}
.catbar button{flex-shrink:0;padding:7px 15px;border-radius:20px;background:transparent;color:var(--tx2);font-weight:700;font-size:13.5px;white-space:nowrap;transition:.15s}
.catbar button:hover{background:var(--sur2)}
.catbar button.on{background:var(--grad);color:#fff;box-shadow:0 4px 12px color-mix(in srgb,var(--p) 32%,transparent)}

/* ===== البانر ===== */
.hero{margin:16px auto 0;max-width:1200px;padding:0 16px}
.hero-in{background:var(--grad);border-radius:24px;padding:30px 28px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--sh2)}
.hero-in::after{content:"";position:absolute;inset-inline-start:-60px;bottom:-80px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.1)}
.hero-in::before{content:"";position:absolute;inset-inline-end:-40px;top:-60px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero-in h1{font-family:'Cairo',sans-serif;font-weight:900;font-size:30px;line-height:1.2;position:relative;z-index:1}
.hero-in p{font-size:15px;opacity:.94;margin-top:6px;position:relative;z-index:1}
.hero-badges{display:flex;gap:10px;margin-top:16px;position:relative;z-index:1;flex-wrap:wrap}
.hero-badges span{background:rgba(255,255,255,.2);backdrop-filter:blur(6px);border-radius:14px;padding:8px 15px;font-size:13px;font-weight:700}
@media(max-width:560px){.hero-in{padding:24px 20px}.hero-in h1{font-size:24px}}

/* ===== أقسام ===== */
.section{max-width:1200px;margin:26px auto 0;padding:0 16px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-head h2{font-family:'Cairo',sans-serif;font-weight:800;font-size:21px;color:var(--tx);display:flex;align-items:center;gap:9px}
.sec-head h2 .em{font-size:24px}
.sec-head a{color:var(--pd);font-weight:700;font-size:13.5px}

/* فئات (بصور) */
.cats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:640px){.cats-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:960px){.cats-grid{grid-template-columns:repeat(4,1fr)}}
.cat-card{position:relative;border-radius:20px;overflow:hidden;aspect-ratio:1.15;cursor:pointer;box-shadow:var(--sh);transition:.2s;background:var(--grad)}
.cat-card:hover{transform:translateY(-4px);box-shadow:var(--sh2)}
.cat-card img{width:100%;height:100%;object-fit:cover}
.cat-card .em-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;background:var(--pl)}
.cat-card .ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.62) 0%,rgba(0,0,0,.05) 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:16px}
.cat-card .ov h3{font-family:'Cairo',sans-serif;font-weight:800;font-size:18px;color:#fff}
.cat-card .ov .go{display:inline-block;margin-top:8px;background:var(--p);color:#fff;border-radius:20px;padding:6px 16px;font-size:12.5px;font-weight:700;width:fit-content}

/* منتجات */
.prods{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:560px){.prods{grid-template-columns:repeat(3,1fr);gap:14px}}
@media(min-width:820px){.prods{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1080px){.prods{grid-template-columns:repeat(5,1fr)}}
.pcard{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);display:flex;flex-direction:column;transition:.18s;position:relative}
.pcard:hover{transform:translateY(-4px);box-shadow:var(--sh2)}
.pcard-img{aspect-ratio:1.2;background:linear-gradient(160deg,var(--pl),var(--sur2));display:flex;align-items:center;justify-content:center;font-size:46px;position:relative}
.pcard-img img{width:100%;height:100%;object-fit:cover}
.pcard-tag{position:absolute;top:8px;inset-inline-start:8px;font-size:10.5px;font-weight:800;border-radius:8px;padding:3px 8px;z-index:1}
.pcard-tag.new{background:var(--green);color:#fff}
.pcard-tag.feat{background:var(--gold);color:#fff}
.pcard-b{padding:11px 12px 12px;display:flex;flex-direction:column;gap:8px;flex:1}
.pcard-nm{font-weight:700;font-size:13.5px;line-height:1.35;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:37px}
.pcard-ft{display:flex;align-items:center;justify-content:space-between;gap:6px}
.pcard-pr{font-family:'Cairo',sans-serif;font-weight:800;font-size:16px;color:var(--pd);white-space:nowrap}
.add-btn{width:38px;height:38px;border-radius:12px;background:var(--grad);color:#fff;font-size:22px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.13s;box-shadow:0 4px 12px color-mix(in srgb,var(--p) 34%,transparent)}
.add-btn:active{transform:scale(.86)}
.stepper{display:flex;align-items:center;gap:4px;background:var(--pl);border-radius:12px;padding:3px;height:38px}
.stepper button{width:32px;height:32px;border-radius:9px;background:var(--sur);color:var(--pd);font-size:19px;font-weight:800;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center}
.stepper button:active{transform:scale(.9)}
.stepper .n{min-width:22px;text-align:center;font-weight:800;font-family:'Cairo',sans-serif}
/* شريط تمرير أفقي للأقسام */
.hscroll{display:flex;gap:12px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.hscroll .pcard{min-width:160px;max-width:190px;flex-shrink:0}

/* ===== سلة عائمة + درج ===== */
.fab{position:fixed;bottom:0;left:0;right:0;z-index:40;padding:12px 16px calc(12px + env(safe-area-inset-bottom));transform:translateY(130%);transition:transform .3s cubic-bezier(.2,.9,.3,1.2)}
.fab.show{transform:none}
.fab-in{max-width:560px;margin:0 auto;background:var(--grad);color:#fff;border-radius:17px;padding:13px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 12px 34px color-mix(in srgb,var(--pd) 50%,transparent);cursor:pointer}
.fab-count{background:rgba(255,255,255,.28);width:32px;height:32px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:'Cairo',sans-serif}
.fab-txt{flex:1;font-weight:700}.fab-tot{font-family:'Cairo',sans-serif;font-weight:800;font-size:17px}
.drawer-bg{position:fixed;inset:0;background:rgba(10,30,35,.5);backdrop-filter:blur(3px);z-index:60;opacity:0;pointer-events:none;transition:.25s}
.drawer-bg.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;z-index:61;background:var(--sur);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.3,.8,.3,1);
  bottom:0;left:0;right:0;max-height:92dvh;border-radius:26px 26px 0 0;transform:translateY(105%)}
.drawer.on{transform:none}
@media(min-width:720px){
  .drawer{top:0;bottom:0;right:0;left:auto;width:430px;max-height:none;border-radius:0;transform:translateX(105%);box-shadow:var(--sh2)}
  html[dir="ltr"] .drawer{right:auto;left:0;transform:translateX(-105%)}
  .drawer.on{transform:translateX(0)!important}
}
.drawer-h{padding:18px 20px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.drawer-h h2{font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;color:var(--pd)}
.drawer-x{width:34px;height:34px;border-radius:11px;background:var(--sur2);color:var(--tx2);font-size:17px}
.drawer-body{flex:1;overflow-y:auto;padding:8px 18px}
.ci{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bd)}
.ci-img{width:52px;height:52px;border-radius:13px;background:linear-gradient(160deg,var(--pl),var(--sur2));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.ci-img img{width:100%;height:100%;object-fit:cover;border-radius:13px}
.ci-nm{flex:1;min-width:0}.ci-nm b{font-weight:700;font-size:14px;display:block}.ci-nm small{color:var(--pd);font-weight:700;font-size:12.5px}
.ci-step{display:flex;align-items:center;gap:5px;background:var(--sur2);border-radius:11px;padding:3px}
.ci-step button{width:29px;height:29px;border-radius:8px;background:var(--sur);color:var(--pd);font-size:17px;font-weight:800;box-shadow:0 1px 2px rgba(0,0,0,.07)}
.ci-step .n{min-width:20px;text-align:center;font-weight:800}
.sum-l{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:var(--tx2)}
.sum-l.big{border-top:1.5px dashed var(--bd);margin-top:6px;padding-top:12px;font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;color:var(--tx)}
.fld{margin:11px 0}.fld label{font-size:13px;color:var(--tx2);font-weight:700;display:block;margin-bottom:5px}
.fld input,.fld textarea{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:13px;font-family:inherit;font-size:14.5px;background:var(--sur2);color:var(--tx)}
.fld input:focus,.fld textarea:focus{outline:none;border-color:var(--p);background:var(--sur)}
.drawer-f{padding:14px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--bd)}
.go{width:100%;padding:16px;border-radius:15px;background:var(--grad);color:#fff;font-family:'Cairo',sans-serif;font-size:16.5px;font-weight:800;transition:.15s;box-shadow:0 8px 22px color-mix(in srgb,var(--p) 34%,transparent)}
.go:active{transform:scale(.98)}.go:disabled{opacity:.55}
.go.alt{background:var(--sur2);color:var(--pd);box-shadow:none;border:1.5px solid var(--bd)}
.err{color:var(--red);font-size:13px;min-height:18px;margin-top:8px;text-align:center;font-weight:600}
.login-note{background:var(--pl);color:var(--pd);border-radius:12px;padding:11px 14px;font-size:13px;text-align:center;font-weight:600;margin-bottom:10px}

/* ===== مودال (دخول/حساب) ===== */
.modal-bg{position:fixed;inset:0;background:rgba(10,30,35,.55);backdrop-filter:blur(4px);z-index:70;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:.2s}
.modal-bg.on{opacity:1;pointer-events:auto}
.modal{background:var(--sur);border-radius:24px;width:100%;max-width:400px;padding:26px 22px;box-shadow:var(--sh2);transform:scale(.94);transition:.2s;max-height:92dvh;overflow-y:auto}
.modal-bg.on .modal{transform:none}
.modal h2{font-family:'Cairo',sans-serif;font-weight:800;font-size:21px;color:var(--pd);text-align:center;margin-bottom:6px}
.modal .msub{text-align:center;color:var(--tx2);font-size:13.5px;margin-bottom:18px}
.otp-in{display:flex;gap:10px;direction:ltr;justify-content:center;margin:8px 0}
.otp-in input{width:56px;height:64px;text-align:center;font-size:26px;font-weight:800;border:1.5px solid var(--bd);border-radius:14px;background:var(--sur2);color:var(--tx);font-family:'Cairo',sans-serif}
.otp-in input:focus{outline:none;border-color:var(--p);background:var(--sur)}
.dev-code{background:#FEF3C7;color:#92610a;border-radius:12px;padding:10px 14px;font-size:13px;text-align:center;font-weight:700;margin-bottom:12px}
html[data-theme="dark"] .dev-code{background:#3a2f10;color:#f2c14e}
.resend{text-align:center;margin-top:12px;font-size:13px;color:var(--tx2)}
.resend a{color:var(--pd);font-weight:700;cursor:pointer}

/* حساب */
.acc-hero{background:var(--grad);color:#fff;border-radius:22px;padding:22px;text-align:center;margin-bottom:18px}
.acc-hero .av{width:70px;height:70px;border-radius:22px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-family:'Cairo',sans-serif;font-weight:900;font-size:30px;margin:0 auto 10px}
.acc-hero h2{font-family:'Cairo',sans-serif;font-weight:800;font-size:20px}
.acc-hero .ph{opacity:.9;font-size:13px;direction:ltr}
.acc-pts{background:rgba(255,255,255,.2);border-radius:16px;padding:12px;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700}
.acc-pts b{font-family:'Cairo',sans-serif;font-size:24px}
.order-item{background:var(--sur);border:1px solid var(--bd);border-radius:15px;padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.order-item .oh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.order-item .oh b{font-family:'Cairo',sans-serif;font-weight:800}
.ost{border-radius:16px;padding:3px 12px;font-size:12px;font-weight:700}
.ost.open{background:#FCF0DA;color:var(--amber)}.ost.confirmed{background:var(--pl);color:var(--pd)}
.ost.paid{background:#E4F6EC;color:var(--green)}.ost.cancelled{background:#FCE7E2;color:var(--red)}

/* ===== حالات ===== */
.empty{text-align:center;color:var(--tx3);padding:50px 20px;grid-column:1/-1}
.empty .big{font-size:52px;margin-bottom:10px}
.skel{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.skel .si{aspect-ratio:1.2;background:linear-gradient(90deg,var(--sur2),var(--bd),var(--sur2));background-size:200% 100%;animation:sh 1.3s infinite}
.skel .sl{height:12px;margin:10px 12px;border-radius:6px;background:linear-gradient(90deg,var(--sur2),var(--bd),var(--sur2));background-size:200% 100%;animation:sh 1.3s infinite}
@keyframes sh{to{background-position:-200% 0}}
.toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:var(--sur);padding:11px 22px;border-radius:13px;font-weight:700;font-size:14px;z-index:80;opacity:0;transition:.25s;box-shadow:var(--sh2);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%)}
.foot{text-align:center;padding:30px 16px 120px;color:var(--tx3);font-size:12px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--pd);font-weight:700;font-size:14px;margin-bottom:14px;cursor:pointer}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const $ = (s, el=document) => el.querySelector(s);
const $$ = (s, el=document) => [...el.querySelectorAll(s)];
const esc = (s) => (s??'').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const TOKEN = new URLSearchParams(location.search).get('t') || '';    // رمز طاولة (وضع QR)
const QR_MODE = !!TOKEN;
let MENU=null, CART={}, CUR='EGP', VIEW={name:'home',cat:null,q:''};
let ME=null, SHOP_TOKEN=localStorage.getItem('shop_token')||'';
const THEME_KEY='menu_theme';
const money = (n) => (+n||0).toLocaleString('ar-EG',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' ' + CUR;
const isImg = (s) => !!s && (s.startsWith('http') || s.startsWith('/uploads'));
const prodEm = (p) => isImg(p.image)? '<img src="'+esc(p.image)+'" loading="lazy">' : '<span style="font-size:46px">'+(p.image||'🍽️')+'</span>';

async function api(path, opts={}){
  const h = { 'Content-Type':'application/json' };
  if(SHOP_TOKEN) h['x-shop-token'] = SHOP_TOKEN;
  const r = await fetch('/api'+path, { ...opts, headers:{...h, ...(opts.headers||{})} });
  const d = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.error||'خطأ');
  return d;
}
let toastT;
function toast(m){ const e=$('#toast'); e.textContent=m; e.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>e.classList.remove('show'),1500); }

async function boot(){
  skeleton();
  try{
    MENU = await api('/public/menu' + (TOKEN? '?t='+encodeURIComponent(TOKEN):''));
    CUR = MENU.cafe.currency;
    document.documentElement.setAttribute('data-preset', MENU.cafe.theme_preset||'seaside');
    if(localStorage.getItem(THEME_KEY)==='dark') document.documentElement.setAttribute('data-theme','dark');
    document.title = MENU.cafe.name + ' — اطلب أونلاين';
    if(SHOP_TOKEN){ try{ ME = await api('/shop/me'); }catch{ SHOP_TOKEN=''; localStorage.removeItem('shop_token'); } }
    render();
  }catch(e){ $('#app').innerHTML = '<div class="done" style="padding:80px 24px;text-align:center"><div style="font-size:60px">😕</div><h2 style="font-family:Cairo;margin:10px">'+esc(e.message)+'</h2></div>'; }
}
function skeleton(){
  $('#app').innerHTML = '<div class="section" style="margin-top:20px"><div class="prods">'+
    Array.from({length:10}).map(()=>'<div class="skel"><div class="si"></div><div class="sl" style="width:80%"></div><div class="sl" style="width:45%"></div></div>').join('')+'</div></div>';
}
const cartCount=()=>Object.values(CART).reduce((s,q)=>s+q,0);
const cartTotal=()=>Object.entries(CART).reduce((s,[id,q])=>{const p=MENU.products.find(x=>x.id===+id);return s+(p?p.price*q:0);},0);
const prodById=(id)=>MENU.products.find(p=>p.id===+id);

/* ============ العرض ============ */
function render(){
  $('#app').innerHTML = header() + catbar() +
    '<div id="view"></div>' +
    fab() +
    '<div class="drawer-bg" id="dbg"></div><div class="drawer" id="drawer"></div>' +
    '<div class="modal-bg" id="mbg"><div class="modal" id="modal"></div></div>' +
    '<div class="foot">مدعوم بنظام seaside POS · '+(QR_MODE?'طلب من الطاولة':'توصيل للمنزل')+'</div>';
  bindHeader();
  renderView();
  syncFab();
}
function header(){
  const c = MENU.cafe;
  return `<div class="topbar"><div class="topbar-in">
    <div class="brand" id="h-brand">
      <div class="logo">${c.custom_logo?'<img src="/logo-custom.png">':'<span class="mk">'+esc((c.name||'◍')[0])+'</span>'}</div>
      <div class="nm">${esc(c.name)}${c.tagline?'<small>'+esc(c.tagline)+'</small>':''}</div>
    </div>
    <div class="tb-search"><span class="ic">🔍</span><input id="h-q" placeholder="ابحث عن منتج…" value="${esc(VIEW.q)}"></div>
    <div class="tb-actions">
      <button class="tb-btn" id="h-theme" title="الوضع الليلي">${document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'}</button>
      ${ME? `<button class="tb-account" id="h-acc"><span class="av">${esc((ME.name||'؟')[0])}</span><span>${esc((ME.name||'حسابي').split(' ')[0])}</span>${MENU.cafe.points_enabled?`<span class="pts">⭐ ${(+ME.points||0).toLocaleString('ar-EG')}</span>`:''}</button>`
        : `<button class="tb-account" id="h-login">👤 دخول</button>`}
      <button class="tb-btn" id="h-cart" title="السلة">🛒<span class="tb-badge hidden" id="h-cart-b"></span></button>
    </div>
  </div></div>`;
}
function catbar(){
  const cats = MENU.categories.filter(c=>MENU.products.some(p=>p.category_id===c.id));
  return `<div class="catbar"><div class="catbar-in">
    <button data-nav="home" class="${VIEW.name==='home'?'on':''}">🏠 الرئيسية</button>
    ${cats.map(c=>`<button data-cat="${c.id}" class="${VIEW.name==='category'&&VIEW.cat===c.id?'on':''}">${c.icon||''} ${esc(c.name_ar)}</button>`).join('')}
  </div></div>`;
}
function bindHeader(){
  $('#h-brand').onclick = ()=>{ VIEW={name:'home',cat:null,q:''}; render(); scrollTop(); };
  $('#h-theme').onclick = toggleTheme;
  $('#h-cart').onclick = openCart;
  const q=$('#h-q'); let qt; q.oninput=()=>{ clearTimeout(qt); qt=setTimeout(()=>{ VIEW={name:'search',cat:null,q:q.value.trim()}; renderView(); },250); };
  const lg=$('#h-login'); if(lg) lg.onclick=openLogin;
  const ac=$('#h-acc'); if(ac) ac.onclick=()=>{ VIEW={name:'account',cat:null,q:''}; renderView(); scrollTop(); };
  $$('[data-nav]').forEach(b=>b.onclick=()=>{ VIEW={name:'home',cat:null,q:''}; render(); scrollTop(); });
  $$('[data-cat]').forEach(b=>b.onclick=()=>{ VIEW={name:'category',cat:+b.dataset.cat,q:''}; render(); scrollTop(); });
}
const scrollTop=()=>window.scrollTo({top:0,behavior:'smooth'});
function renderView(){
  const v=$('#view'); if(!v) return;
  if(VIEW.name==='home') v.innerHTML = viewHome();
  else if(VIEW.name==='category') v.innerHTML = viewCategory();
  else if(VIEW.name==='search') v.innerHTML = viewSearch();
  else if(VIEW.name==='account') return renderAccount();
  bindProducts();
  $$('[data-back]').forEach(b=>b.onclick=()=>{ VIEW={name:'home',cat:null,q:''}; render(); scrollTop(); });
  $$('[data-catnav]').forEach(b=>b.onclick=()=>{ VIEW={name:'category',cat:+b.dataset.catnav,q:''}; render(); scrollTop(); });
}
function pcard(p){
  const n=CART[p.id]||0;
  const tag = p.is_new? '<span class="pcard-tag new">جديد</span>' : p.is_featured? '<span class="pcard-tag feat">مميّز</span>' : '';
  return `<div class="pcard"><div class="pcard-img">${tag}${prodEm(p)}</div>
    <div class="pcard-b"><div class="pcard-nm">${esc(p.name_ar)}</div>
    <div class="pcard-ft"><div class="pcard-pr">${money(p.price)}</div>
    ${n? `<div class="stepper"><button data-m="${p.id}">−</button><span class="n">${n}</span><button data-a="${p.id}">+</button></div>`
      : `<button class="add-btn" data-a="${p.id}">+</button>`}</div></div></div>`;
}
function viewHome(){
  const c=MENU.cafe;
  const cats = MENU.categories.filter(c=>MENU.products.some(p=>p.category_id===c.id));
  const news = MENU.newIds.map(prodById).filter(Boolean);
  const tops = MENU.topIds.map(prodById).filter(Boolean);
  const feats = MENU.featuredIds.map(prodById).filter(Boolean);
  const catImg = (cat)=>{ if(isImg(cat.image)) return '<img src="'+esc(cat.image)+'">'; const p=MENU.products.find(x=>x.category_id===cat.id&&isImg(x.image)); return p? '<img src="'+esc(p.image)+'">' : '<div class="em-bg">'+(cat.icon||'🍽️')+'</div>'; };
  return `
    <div class="hero"><div class="hero-in">
      <h1>${esc(c.hero_title||'أطلب دلوقتي أونلاين')}</h1>
      <p>${esc(c.hero_sub||'أشهى المنتجات توصلك لحد باب البيت')}</p>
      <div class="hero-badges"><span>🚚 توصيل سريع</span>${c.points_enabled?'<span>⭐ اكسب نقاط</span>':''}<span>✅ جودة مضمونة</span></div>
    </div></div>
    ${feats.length? section('⭐ منتجات مميّزة', hscroll(feats)) : ''}
    <div class="section"><div class="sec-head"><h2><span class="em">🗂️</span> الفئات</h2></div>
      <div class="cats-grid">${cats.map(cat=>`<div class="cat-card" data-catnav="${cat.id}">${catImg(cat)}<div class="ov"><h3>${esc(cat.name_ar)}</h3><span class="go">تسوّق الآن ←</span></div></div>`).join('')}</div></div>
    ${news.length? section('🆕 أحدث المنتجات', hscroll(news)) : ''}
    ${tops.length? section('🔥 الأكثر مبيعاً', hscroll(tops)) : ''}`;
}
function section(title, inner){ return `<div class="section"><div class="sec-head"><h2>${title}</h2></div>${inner}</div>`; }
function hscroll(list){ return '<div class="hscroll">'+list.map(pcard).join('')+'</div>'; }
function viewCategory(){
  const cat=MENU.categories.find(c=>c.id===VIEW.cat);
  const list=MENU.products.filter(p=>p.category_id===VIEW.cat);
  return `<div class="section"><span class="back-link" data-back>→ الرئيسية</span>
    <div class="sec-head"><h2><span class="em">${cat?.icon||'🗂️'}</span> ${esc(cat?.name_ar||'')} <span style="font-weight:400;color:var(--tx3);font-size:14px">(${list.length})</span></h2></div>
    <div class="prods">${list.map(pcard).join('')||'<div class="empty"><div class="big">🍽️</div>لا منتجات في هذه الفئة</div>'}</div></div>`;
}
function viewSearch(){
  const list=MENU.products.filter(p=>p.name_ar.includes(VIEW.q));
  return `<div class="section"><div class="sec-head"><h2><span class="em">🔍</span> نتائج: ${esc(VIEW.q)} <span style="font-weight:400;color:var(--tx3);font-size:14px">(${list.length})</span></h2></div>
    <div class="prods">${list.map(pcard).join('')||'<div class="empty"><div class="big">🔍</div>لا نتائج مطابقة</div>'}</div></div>`;
}
function bindProducts(){
  $$('#view [data-a]').forEach(b=>b.onclick=()=>{ const p=prodById(b.dataset.a); CART[b.dataset.a]=(CART[b.dataset.a]||0)+1; toast('➕ '+p.name_ar); renderView(); syncFab(); });
  $$('#view [data-m]').forEach(b=>b.onclick=()=>{ const id=b.dataset.m; if(--CART[id]<=0) delete CART[id]; renderView(); syncFab(); });
}
function toggleTheme(){
  const d=document.documentElement, on=d.getAttribute('data-theme')==='dark';
  if(on){ d.removeAttribute('data-theme'); localStorage.setItem(THEME_KEY,'light'); } else { d.setAttribute('data-theme','dark'); localStorage.setItem(THEME_KEY,'dark'); }
  $('#h-theme').textContent = on?'🌙':'☀️';
}
function fab(){ return '<div class="fab" id="fab"><div class="fab-in" id="fab-in"><span class="fab-count" id="fab-count">0</span><span class="fab-txt">عرض السلة</span><span class="fab-tot" id="fab-tot"></span><span>←</span></div></div>'; }
function syncFab(){
  const n=cartCount();
  $('#fab')?.classList.toggle('show', n>0);
  const cb=$('#h-cart-b'); if(cb){ cb.textContent=n; cb.classList.toggle('hidden',!n); }
  if($('#fab-count')){ $('#fab-count').textContent=n; $('#fab-tot').textContent=money(cartTotal()); }
  $('#fab-in') && ($('#fab-in').onclick=openCart);
}

/* ============ السلة والـ checkout ============ */
function calcTotals(){
  const sub=cartTotal();
  const taxes=(MENU.taxes||[]).map(t=>({...t,amount:sub*t.rate/100}));
  const taxTotal=taxes.reduce((s,t)=>s+t.amount,0);
  const fee=(!QR_MODE)? (MENU.cafe.delivery_fee||0):0;
  return { sub, taxes, taxTotal, fee, grand: sub+taxTotal+fee };
}
function openCart(){ drawCart(); $('#dbg').classList.add('on'); $('#drawer').classList.add('on'); document.body.style.overflow='hidden'; }
function closeCart(){ $('#dbg').classList.remove('on'); $('#drawer').classList.remove('on'); document.body.style.overflow=''; }
function drawCart(){
  const lines=Object.entries(CART).map(([id,q])=>({p:prodById(id),q})).filter(l=>l.p);
  const t=calcTotals();
  const needLogin = !QR_MODE && MENU.cafe.require_login && !ME;
  $('#dbg').onclick=closeCart;
  $('#drawer').innerHTML = `
    <div class="drawer-h"><h2>🛒 ${QR_MODE?'طلبك':'سلة التسوق'}</h2><button class="drawer-x" id="dx">✕</button></div>
    <div class="drawer-body">
      ${lines.length? lines.map(l=>`<div class="ci"><div class="ci-img">${prodEm(l.p)}</div>
        <div class="ci-nm"><b>${esc(l.p.name_ar)}</b><small>${money(l.p.price)}</small></div>
        <div class="ci-step"><button data-m="${l.p.id}">−</button><span class="n">${l.q}</span><button data-a="${l.p.id}">+</button></div></div>`).join('')
        : '<div class="empty"><div class="big">🛒</div>سلتك فارغة</div>'}
      ${lines.length? `<div style="margin-top:8px">
        <div class="sum-l"><span>الإجمالي الفرعي</span><b>${money(t.sub)}</b></div>
        ${t.taxes.filter(x=>x.show&&x.amount>0).map(x=>`<div class="sum-l"><span>${esc(x.name)} (${x.rate}%)</span><b>${money(x.amount)}</b></div>`).join('')}
        ${t.fee?`<div class="sum-l"><span>🛵 مصاريف التوصيل</span><b>${money(t.fee)}</b></div>`:''}
        <div class="sum-l big"><span>الإجمالي</span><span>${money(t.grand)}</span></div></div>
        ${needLogin? `<div class="login-note">🔒 سجّل دخولك برقم موبايلك لإتمام الطلب</div>`
        : (!QR_MODE? `
          <div class="fld"><label>الاسم</label><input id="c-name" maxlength="60" value="${esc(ME?.name||'')}"></div>
          <div class="fld"><label>رقم الموبايل</label><input id="c-phone" inputmode="tel" maxlength="20" value="${esc(ME?.phone||'')}" ${ME?'disabled style="opacity:.7"':''}></div>
          <div class="fld"><label>العنوان بالتفصيل *</label><textarea id="c-addr" rows="2" maxlength="250" placeholder="الحي — الشارع — العمارة — الدور — علامة مميزة"></textarea></div>
          <div class="fld"><label>ملاحظات</label><textarea id="c-note" rows="2" maxlength="200"></textarea></div>` : `
          <div class="fld"><label>ملاحظات</label><textarea id="c-note" rows="2" maxlength="200" placeholder="مثال: بدون سكر…"></textarea></div>`)}`:''}
    </div>
    ${lines.length? `<div class="drawer-f">${needLogin
      ? `<button class="go" id="c-login">👤 تسجيل الدخول لإتمام الطلب</button>`
      : `<button class="go" id="send">${QR_MODE?'✅ إرسال الطلب':'🛵 تأكيد الطلب'} · ${money(t.grand)}</button>`}<div class="err" id="e"></div></div>`:''}`;
  $('#dx').onclick=closeCart;
  $$('#drawer [data-a]').forEach(b=>b.onclick=()=>{ CART[b.dataset.a]=(CART[b.dataset.a]||0)+1; drawCart(); renderView(); syncFab(); });
  $$('#drawer [data-m]').forEach(b=>b.onclick=()=>{ const id=b.dataset.m; if(--CART[id]<=0)delete CART[id]; drawCart(); renderView(); syncFab(); if(!cartCount())closeCart(); });
  const cl=$('#c-login'); if(cl) cl.onclick=()=>{ closeCart(); openLogin(()=>openCart()); };
  const s=$('#send'); if(s) s.onclick=submit;
}
async function submit(){
  $('#send').disabled=true; $('#e').textContent='';
  try{
    const items=Object.entries(CART).map(([id,q])=>({product_id:+id,qty:q}));
    const body={ items, note:($('#c-note')?.value||'').trim() };
    if(QR_MODE){ body.t=TOKEN; }
    else {
      body.mode='delivery'; body.address=($('#c-addr')?.value||'').trim();
      body.name=($('#c-name')?.value||ME?.name||'').trim(); body.phone=(ME?.phone||$('#c-phone')?.value||'').trim();
      if(!body.address){ $('#e').textContent='من فضلك أدخل العنوان'; $('#send').disabled=false; return; }
    }
    const d=await api('/public/orders',{method:'POST',body:JSON.stringify(body)});
    CART={}; closeCart(); if(ME){ try{ ME=await api('/shop/me'); }catch{} } showDone(d);
  }catch(e){ $('#e').textContent=e.message; $('#send').disabled=false; }
}
function showDone(d){
  document.body.style.overflow='';
  $('#app').innerHTML = header()+`<div style="max-width:460px;margin:0 auto;text-align:center;padding:50px 24px">
    <div style="font-size:70px">🎉</div><h2 style="font-family:Cairo;font-weight:800;font-size:24px;color:var(--tx);margin:12px 0 4px">تم استلام طلبك!</h2>
    <p style="color:var(--tx2)">${QR_MODE?'هيوصلك على الطاولة بعد تأكيد المطعم':'هنبعتلك إشعار واتساب بمجرد قبول الطلب 📲'}</p>
    <div style="display:inline-block;background:var(--pl);color:var(--pd);border-radius:14px;padding:10px 24px;font-family:Cairo;font-weight:800;font-size:18px;margin:14px 0">${esc(d.invoice_no)}</div>
    <div style="font-size:16px;margin-bottom:6px">الإجمالي: <b>${money(d.total)}</b></div>
    <div style="color:var(--tx3);font-size:13px">${QR_MODE?'الدفع عند الكاشير':'الدفع كاش عند الاستلام'}</div>
    <div class="track" id="track" style="display:inline-flex;align-items:center;gap:8px;border-radius:24px;padding:9px 22px;font-weight:700;font-size:14px;margin-top:14px;background:#FCF0DA;color:var(--amber)">⏳ في انتظار تأكيد المطعم…</div><br>
    <button class="go" style="max-width:280px;margin-top:26px" onclick="location.href='/menu'+(location.search)">🍽️ الرجوع للمتجر</button></div>`;
  bindHeaderDone();
  const poll=setInterval(async()=>{
    try{
      const q = QR_MODE? 't='+encodeURIComponent(TOKEN) : 'p='+encodeURIComponent(ME?.phone||'');
      const r=await fetch('/api/public/orders/'+d.id+'/status?'+q); const s=await r.json(); if(!r.ok)return;
      const el=$('#track'); if(!el){clearInterval(poll);return;}
      if(s.status==='confirmed'){ el.textContent='👨‍🍳 اتقبل الطلب وجاري التحضير'; el.style.background='#E4F6EC'; el.style.color='var(--green)'; }
      else if(s.status==='paid'){ el.textContent='✅ اكتمل الطلب — بالهنا والشفا!'; el.style.background='#E4F6EC'; el.style.color='var(--green)'; clearInterval(poll); }
      else if(s.status==='cancelled'){ el.textContent='❌ اعتذر المطعم عن الطلب'; el.style.background='#FCE7E2'; el.style.color='var(--red)'; clearInterval(poll); }
    }catch{}
  },7000);
}
function bindHeaderDone(){ $('#h-brand').onclick=()=>location.href='/menu'+location.search; const t=$('#h-theme'); if(t)t.onclick=toggleTheme; }

/* ============ تسجيل الدخول (OTP واتساب) ============ */
function openModal(html){ $('#modal').innerHTML=html; $('#mbg').classList.add('on'); document.body.style.overflow='hidden'; $('#mbg').onclick=(e)=>{ if(e.target.id==='mbg') closeModal(); }; }
function closeModal(){ $('#mbg').classList.remove('on'); document.body.style.overflow=''; }
let LOGIN_PHONE='', LOGIN_CB=null;
function openLogin(cb){
  LOGIN_CB = cb||null;
  openModal(`<h2>👤 تسجيل الدخول</h2><div class="msub">أدخل رقم موبايلك ونبعتلك كود تفعيل على الواتساب</div>
    <div class="fld"><label>رقم الموبايل</label><input id="lg-phone" inputmode="tel" maxlength="11" placeholder="01xxxxxxxxx" value="${esc(LOGIN_PHONE)}" dir="ltr" style="text-align:center;font-size:18px;letter-spacing:2px"></div>
    <button class="go" id="lg-send">📲 إرسال كود التفعيل</button><div class="err" id="lg-e"></div>`);
  $('#lg-phone').focus();
  $('#lg-send').onclick=async()=>{
    const phone=$('#lg-phone').value.trim();
    $('#lg-e').textContent=''; $('#lg-send').disabled=true;
    try{ const r=await api('/shop/otp/send',{method:'POST',body:JSON.stringify({phone})}); LOGIN_PHONE=phone; otpStep(r); }
    catch(e){ $('#lg-e').textContent=e.message; $('#lg-send').disabled=false; }
  };
  $('#lg-phone').onkeydown=(e)=>{ if(e.key==='Enter') $('#lg-send').click(); };
}
function otpStep(r){
  openModal(`<h2>🔐 كود التفعيل</h2><div class="msub">أدخل الكود المرسل على واتساب <b dir="ltr">${esc(LOGIN_PHONE)}</b></div>
    ${r.dev? `<div class="dev-code">💻 وضع تجريبي — كودك: <b style="font-size:17px;letter-spacing:2px">${esc(r.dev_code)}</b></div>`:''}
    <div class="otp-in">${[0,1,2,3].map(i=>`<input id="o${i}" inputmode="numeric" maxlength="1">`).join('')}</div>
    <button class="go" id="ot-go">✅ تأكيد الدخول</button><div class="err" id="ot-e"></div>
    <div class="resend">لم يصلك الكود؟ <a id="ot-resend">إعادة الإرسال</a></div>`);
  const ins=[0,1,2,3].map(i=>$('#o'+i));
  ins[0].focus();
  ins.forEach((inp,i)=>{
    inp.oninput=()=>{ inp.value=inp.value.replace(/\D/g,''); if(inp.value&&i<3)ins[i+1].focus(); if(ins.every(x=>x.value))verify(); };
    inp.onkeydown=(e)=>{ if(e.key==='Backspace'&&!inp.value&&i>0)ins[i-1].focus(); };
  });
  $('#ot-go').onclick=verify;
  $('#ot-resend').onclick=()=>openLogin(LOGIN_CB);
  async function verify(){
    const code=ins.map(x=>x.value).join('');
    if(code.length<4)return;
    $('#ot-e').textContent=''; $('#ot-go').disabled=true;
    try{
      const d=await api('/shop/otp/verify',{method:'POST',body:JSON.stringify({phone:LOGIN_PHONE,code})});
      SHOP_TOKEN=d.token; localStorage.setItem('shop_token',SHOP_TOKEN);
      ME=await api('/shop/me'); closeModal(); toast('أهلاً بيك '+(ME.name||'')); render();
      if(LOGIN_CB) setTimeout(LOGIN_CB,200);
    }catch(e){ $('#ot-e').textContent=e.message; $('#ot-go').disabled=false; ins.forEach(x=>x.value=''); ins[0].focus(); }
  }
}
async function logout(){ try{ await api('/shop/logout',{method:'POST'}); }catch{} SHOP_TOKEN=''; ME=null; localStorage.removeItem('shop_token'); VIEW={name:'home',cat:null,q:''}; render(); toast('تم تسجيل الخروج'); }

/* ============ حساب العميل ============ */
async function renderAccount(){
  const v=$('#view'); v.innerHTML='<div class="section" style="text-align:center;padding:40px"><div class="skel sl" style="width:60%;margin:auto"></div></div>';
  try{ ME=await api('/shop/me'); }catch{ SHOP_TOKEN=''; ME=null; VIEW={name:'home'}; return render(); }
  const OST={open:['⏳ بانتظار القبول','open'],confirmed:['👨‍🍳 جاري التحضير','confirmed'],paid:['✅ مكتمل','paid'],cancelled:['❌ ملغي','cancelled']};
  v.innerHTML = `<div class="section"><span class="back-link" data-back>→ الرئيسية</span>
    <div class="acc-hero"><div class="av">${esc((ME.name||'؟')[0])}</div><h2>${esc(ME.name||'عميل')}</h2><div class="ph" dir="ltr">${esc(ME.phone)}</div>
      ${MENU.cafe.points_enabled? `<div class="acc-pts">⭐ رصيد نقاطك: <b>${(+ME.points||0).toLocaleString('ar-EG')}</b></div>`:''}</div>
    <div class="sec-head"><h2 style="font-size:18px">📦 طلباتي</h2><a id="acc-logout" style="cursor:pointer;color:var(--red)">تسجيل خروج</a></div>
    ${ME.orders.length? ME.orders.map(o=>{const st=OST[o.status]||['—','open'];return `<div class="order-item"><div class="oh"><b>${esc(o.invoice_no)}</b><span class="ost ${st[1]}">${st[0]}</span></div>
      <div style="display:flex;justify-content:space-between;color:var(--tx2);font-size:13px"><span>${o.order_type==='delivery'?'🛵 توصيل':'🪑 محلي'} · ${new Date(o.created_at).toLocaleString('ar-EG',{dateStyle:'short',timeStyle:'short'})}</span><b style="color:var(--pd)">${money(o.total)}</b></div></div>`;}).join('')
      : '<div class="empty"><div class="big">📦</div>لا طلبات بعد — ابدأ التسوق!</div>'}
    </div>`;
  $('#acc-logout').onclick=logout;
  $$('[data-back]').forEach(b=>b.onclick=()=>{ VIEW={name:'home',cat:null,q:''}; render(); scrollTop(); });
}
boot();
</script>
</body>
</html>
